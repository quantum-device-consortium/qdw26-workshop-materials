name: Docker Smoke

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t qdw-workshop-materials:ci .

      - name: Run smoke checks
        run: docker run --rm qdw-workshop-materials:ci python scripts/smoke_environment.py
