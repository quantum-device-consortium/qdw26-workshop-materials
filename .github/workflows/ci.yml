name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate workshop manifests
        run: python scripts/validate_workshops.py

      - name: Validate notebooks
        run: python scripts/check_notebooks.py

      - name: Check shell scripts
        run: bash -n scripts/*.sh

      - name: Validate Docker Compose
        run: docker compose config

      - name: Validate deployment Docker Compose
        run: docker compose -f compose.deploy.yaml config
