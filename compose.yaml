services:
  dev:
    platform: linux/amd64
    build: .
    image: ghcr.io/quantum-device-consortium/qdw-workshop-materials:main
    working_dir: /home/ubuntu/qdw-workshop-materials
    volumes:
      - .:/home/ubuntu/qdw-workshop-materials
    environment:
      QISKIT_METAL_HEADLESS: "1"
    command: ["sh", "-c", "uv sync --locked && exec sleep infinity"]
